apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: javaapp
      version: canary
  template:
    metadata:
      labels:
        app: javaapp
        version: canary
    spec:
      containers:
      - name: javaapp
        image: REPLACE_CANARY_IMAGE
        ports:
        - containerPort: 8080
