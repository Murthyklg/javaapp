apiVersion: apps/v1
kind: Deployment
metadata:
  name: javaapp
spec:
  replicas: 4
  selector:
    matchLabels:
      app: javaapp
  template:
    metadata:
      labels:
        app: javaapp
    spec:
      containers:
      - name: java-app
        image: murthy4797/javaapp:latest
        ports:
        - containerPort: 8080
